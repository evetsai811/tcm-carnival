<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>中醫嘉年華｜動物森林體質探索站</title>
<style>
:root{
  --green:#2f7d45;--light:#f6fbef;--cream:#fff8e8;--brown:#8b5e34;--orange:#f2a646;
  --pink:#ffe6e8;--blue:#e8f5ff;--shadow:0 10px 30px rgba(60,90,55,.18)
}
*{box-sizing:border-box}
body{
  margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;color:#2c3a2f;
  background:radial-gradient(circle at 10% 5%,#fff6d9 0 18%,transparent 18%),
             linear-gradient(180deg,#f7fff2,#fff8e8);
}
.container{max-width:720px;margin:0 auto;padding:14px 14px 30px}
.panel{background:rgba(255,255,255,.94);border:1px solid #eadfca;border-radius:28px;padding:22px;margin:14px 0;box-shadow:var(--shadow);position:relative;overflow:hidden}
.panel:before{content:"🌿";position:absolute;right:18px;top:12px;font-size:2rem;opacity:.55}
.hero{text-align:center;background:linear-gradient(180deg,#fff7df,#f2f8dd);min-height:90vh;display:flex;flex-direction:column;justify-content:center}
.hero h1{font-size:2.5rem;line-height:1.15;color:var(--green);margin:6px 0 8px;text-shadow:1px 2px #fff}
.subtitle{display:inline-block;background:#7fa35a;color:white;border-radius:999px;padding:8px 18px;font-weight:900;margin:8px auto}
.forest{font-size:3.3rem;line-height:1.35;margin:18px 0;filter:drop-shadow(0 6px 2px rgba(90,120,70,.12))}
.button{border:0;border-radius:999px;background:linear-gradient(180deg,#54a866,#2f884b);color:white;font-size:1.12rem;font-weight:900;padding:14px 28px;box-shadow:0 7px 15px rgba(50,110,60,.22);cursor:pointer}
.button.secondary{background:#f3ead8;color:#65472c;border:1px solid #dbc8a9;box-shadow:none}
.button:disabled{opacity:.45;cursor:not-allowed}
.steps{display:flex;justify-content:center;gap:8px;margin:4px 0 18px}
.dot{width:34px;height:34px;border-radius:50%;background:#f2eadc;color:#8c7a60;display:flex;align-items:center;justify-content:center;font-weight:900;border:1px solid #dccbad}
.dot.active{background:var(--green);color:white}
h2{color:var(--green);text-align:center;margin-top:8px}
.genderCard{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.choice{border:2px solid #dce8d7;background:#fbfff7;border-radius:22px;padding:18px;text-align:center;font-size:1.25rem;font-weight:900;cursor:pointer}
.choice:nth-child(2){background:#fff6f7;border-color:#f2cbcf}
.choice.selected{border-color:var(--green);box-shadow:0 0 0 4px rgba(85,160,95,.15)}
.avatar{font-size:3.5rem;margin-bottom:8px}
.tip{background:#fff8e8;border:1px solid #ead9b9;border-radius:18px;padding:12px;margin-top:12px;line-height:1.7}
.progress{height:10px;background:#e6dfd0;border-radius:999px;overflow:hidden;margin:10px 0}
.bar{height:100%;background:linear-gradient(90deg,#9dcc6b,#2f884b);width:0%;transition:.25s}
.question{font-size:1.25rem;font-weight:900;line-height:1.65;text-align:center;margin:16px 0}
.mascotBig{text-align:center;font-size:5.4rem;margin:8px 0}
.scale{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}
.scale button{background:#fff;border:2px solid #ddd3bd;border-radius:16px;padding:10px 2px;color:#3a3a32;font-weight:900;box-shadow:none}
.scale button.selected{background:#60aa67;color:white;border-color:#60aa67}
.scale small{display:block;font-size:.68rem;font-weight:500;margin-top:6px}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:18px}
table{width:100%;border-collapse:collapse;background:white;border-radius:16px;overflow:hidden}
th,td{padding:9px;border-bottom:1px solid #efe8d8}
.scorebar{height:9px;background:#eee3d1;border-radius:99px;overflow:hidden;min-width:90px}
.scorebar span{display:block;height:100%;background:#78b96f}
.resultName{text-align:center;color:var(--green);font-size:2rem;font-weight:1000;margin:8px 0}
.bigScore{text-align:center;font-size:4rem;font-weight:1000;color:var(--green)}
.adviceItem{display:flex;gap:10px;align-items:flex-start;background:#fffaf0;border:1px solid #eadcc4;border-radius:16px;padding:12px;margin:10px 0}
.adviceIcon{font-size:1.8rem}
.hidden{display:none}
.footer{text-align:center;color:#7b776d;font-size:.8rem;margin-top:12px}
@media(max-width:520px){
 .hero h1{font-size:2.1rem}.forest{font-size:2.65rem}.panel{padding:18px;border-radius:24px}.scale{gap:5px}.scale button{font-size:.9rem}
}
</style>
</head>
<body>
<div class="container">

<section id="home" class="panel hero">
  <div class="forest">🦥 🐰 🐱 🦝<br>🦄 🦌 🐢 🐉</div>
  <h1>中醫嘉年華<br>體質探索站</h1>
  <div class="subtitle">30秒了解你的中醫體質</div>
  <p>透過簡單問卷，找到你的體質動物夥伴，獲得專屬養生建議！</p>
  <button class="button" onclick="go('gender')">開始體質檢測 🍀</button>
  <p class="footer">本問卷僅供健康促進與衛教參考，非醫療診斷。</p>
</section>

<section id="gender" class="panel hidden">
  <div class="steps"><div class="dot active">1</div><div class="dot">2</div><div class="dot">3</div><div class="dot">4</div><div class="dot">5</div></div>
  <h2>請選擇您的性別</h2>
  <div class="genderCard">
    <div class="choice" onclick="selectGender('male',this)"><div class="avatar">👦</div>男性</div>
    <div class="choice" onclick="selectGender('female',this)"><div class="avatar">👧</div>女性</div>
  </div>
  <div class="tip">🦥 樹懶提醒：系統會依性別自動調整部分題目喔！</div>
  <div class="nav"><button class="button secondary" onclick="go('home')">回首頁</button><button id="genderNext" disabled class="button" onclick="startStage1()">下一步</button></div>
</section>

<section id="question" class="panel hidden">
  <div class="steps" id="stepDots"></div>
  <h2 id="stepLabel"></h2>
  <div class="progress"><div id="progressBar" class="bar"></div></div>
  <div id="mascot" class="mascotBig"></div>
  <div class="question" id="qText"></div>
  <div class="scale" id="scaleBtns"></div>
  <div class="tip" id="animalTip"></div>
  <div class="nav"><button class="button secondary" onclick="prevQ()">上一題</button><button id="nextBtn" class="button" onclick="nextQ()">下一題</button></div>
</section>

<section id="stage1Result" class="panel hidden">
  <div class="steps"><div class="dot">1</div><div class="dot active">2</div><div class="dot">3</div><div class="dot">4</div><div class="dot">5</div></div>
  <h2>第1階段結果</h2>
  <div class="mascotBig">🦝</div>
  <p>您的各體質初篩分數如下：</p>
  <div id="scoreTable"></div>
  <div id="stage1Conclusion" class="tip"></div>
  <button class="button" onclick="startStage2()">進入對應體質問卷</button>
</section>

<section id="final" class="panel hidden">
  <div class="steps"><div class="dot">1</div><div class="dot">2</div><div class="dot">3</div><div class="dot active">4</div><div class="dot">5</div></div>
  <div id="finalMascot" class="mascotBig"></div>
  <div class="resultName" id="finalTitle"></div>
  <div class="bigScore" id="finalScore"></div>
  <h2 id="finalJudge"></h2>
  <div id="finalDetails"></div>
  <h2>專屬養生建議</h2>
  <div id="finalAdvice"></div>
  <div class="nav"><button class="button" onclick="restart()">重新檢測</button><button class="button secondary" onclick="window.print()">列印/儲存</button></div>
</section>

<div class="footer">佛教慈濟醫療財團法人三義慈濟醫院｜健康台灣深耕計畫｜動物森林展示版 v2</div>
</div>

<script>
let gender=null, mode="", current=0, answers=[], stage2List=[], stage2Results=[];
const labels=["沒有或根本不","很少或有一點","有時或有些","經常或相當","總是或非常"];
const typeMeta={
 shiRe:{name:"實熱體質",animal:"🐉",tip:"小龍提醒：留意上火、口乾與燥熱感。",advice:["清淡飲食，少辛辣油炸。","補充水分，避免熬夜。","若常口破或咽喉痛，可諮詢中醫師。"]},
 xuRe:{name:"虛熱體質",animal:"🦄",tip:"獨角獸提醒：身體需要溫柔修復。",advice:["避免熬夜與過度消耗。","選擇溫和放鬆的運動。","注意口乾、眼乾與睡眠品質。"]},
 xuHan:{name:"虛寒體質",animal:"🐢",tip:"烏龜提醒：慢慢暖起來，身體會更舒服。",advice:["注意保暖，少喝冰飲。","規律活動促進循環。","避免長時間待在冷氣太強的環境。"]},
 tanShiRe:{name:"痰濕熱體質",animal:"🦝",tip:"浣熊提醒：清爽一點，身體更輕盈。",advice:["飲食清淡，少油炸、甜食與含糖飲料。","增加規律活動。","注意口苦、油膩感與排便狀況。"]},
 qiXu:{name:"氣虛體質",animal:"🦥",tip:"樹懶提醒：慢慢來，也要記得休息。",advice:["避免過勞，保持規律作息。","循序漸進增加運動。","疲倦明顯時建議諮詢中醫師。"]},
 xueXu:{name:"血虛體質",animal:"🐰",tip:"兔子提醒：要好好照顧自己的能量。",advice:["重視睡眠與營養均衡。","避免長期熬夜。","留意頭暈、面色與睡眠狀況。"]},
 qiYu:{name:"氣鬱體質",animal:"🐱",tip:"貓咪提醒：給自己一點舒服的空間。",advice:["保持心情舒暢。","練習呼吸放鬆與戶外散步。","壓力大時可尋求專業協助。"]},
 xueYu:{name:"血瘀體質",animal:"🦌",tip:"小鹿提醒：動一動，讓循環更順。",advice:["維持活動量，避免久坐。","注意身體疼痛與瘀斑情形。","若疼痛持續，建議諮詢醫師。"]},
 pingHe:{name:"平和體質",animal:"🐦",tip:"小鳥提醒：保持平衡就是最好的養生。",advice:["維持規律作息。","均衡飲食與適度運動。","保持心情愉快。"]}
};
const types=[
 {key:"shiRe", qs:[0,1]},{key:"xuRe", qs:[2,3]},{key:"xuHan", qs:[4,5]},{key:"tanShiRe", qs:[6,7]},
 {key:"qiXu", qs:[8,9]},{key:"xueXu", qs:[10,11]},{key:"qiYu", qs:[12,13]},{key:"xueYu", qs:[14,15]}
];
const stage1=[
"您怕熱而耐寒嗎？","您容易上火（常有咽喉痛、舌瘡、口腔潰瘍、口、鼻、唇乾熱感或生瘡癤）嗎？",
"您感到手腳心發熱嗎？","您皮膚或口唇乾嗎？","您手腳發涼嗎？","您感到怕冷、衣服比別人穿得多嗎？",
"您面部或鼻部有油膩感或者油亮發光嗎？","您大便黏滯不爽、有解不盡的感覺嗎？","您容易疲乏嗎？",
"您說話聲音低弱無力嗎？","您的面色蒼白或面色黃而無光澤嗎？","您容易頭暈眼花嗎？（特別是下蹲起立時）",
"您容易精神緊張、焦慮不安嗎？","您無緣無故嘆氣嗎？","您身體上有哪裡疼痛嗎？","您面色晦黯或容易出現褐斑嗎？"
];
const stage2={
shiRe:["您怕熱而耐寒嗎？","您喜歡吃寒涼飲食，或耐受寒涼藥物嗎？","您容易上火（常有咽喉痛、舌瘡、口腔潰瘍、口、鼻、唇乾熱感或生瘡癤）嗎？","您舌體偏紅嗎？","您容易口乾，渴喜冷飲嗎？","您的性慾較強嗎？","您形體強壯結實嗎？","您小便色黃嗎？"],
xuRe:["您感到手腳心發熱嗎？","您感覺身體、臉上發熱嗎？","您皮膚或口唇乾嗎？","您口唇的顏色比一般人紅嗎？","您容易便秘或大便乾燥嗎？","您面部兩顴潮紅或偏紅嗎？","您感到眼睛乾澀嗎？","您感到口乾咽燥，總想喝水嗎？"],
xuHan:["您手腳發涼嗎？","您的胃脘部、背部或腰膝部怕冷嗎？","您感到怕冷、衣服比別人穿得多嗎？","您比一般人耐受不了寒冷（冬天的寒冷，夏天的冷氣空調、電扇等）嗎？","您比別人容易患感冒嗎？","您吃喝涼的東西會感到不舒服或怕吃喝涼東西嗎？","您受涼或吃喝涼的東西後，容易腹瀉（拉肚子）嗎？"],
tanShiRe:["您面部或鼻部有油膩感或者油亮發光嗎？","您容易生痤瘡或瘡癤嗎？","您感到口苦或嘴裡有異味嗎？","您大便黏滯不爽、有解不盡的感覺嗎？","您小便時尿道有發熱感、尿色濃（深）嗎？",{female:"您帶下色黃（白帶顏色發黃）嗎？限女性答",male:"您的陰囊部位潮濕嗎？限男性答"}],
qiXu:["您容易疲乏嗎？","您容易氣短（呼吸短促，接不上氣）嗎？","您容易心慌嗎？","您容易頭暈或站起時眩暈嗎？","您比別人容易感冒嗎？","您喜歡安靜、懶得說話嗎？","您說話聲音低弱無力嗎？","您活動量稍大就容易出虛汗嗎？"],
xueXu:["您的面色蒼白或面色黃而無光澤嗎？","您容易頭暈眼花嗎？（特別是下蹲起立時）",{female:"您的月經顏色淺淡而經量少嗎？限女性答",male:null},"您感覺肢體容易麻木嗎？","您的口唇顏色淡白嗎？","您的指甲顏色淡白嗎？","您的舌體顏色淡白嗎？","您的睡眠品質不好或容易多夢嗎？"],
qiYu:["您感到悶悶不樂、情緒低沉嗎？","您容易精神緊張、焦慮不安嗎？","您多愁善感、感情脆弱嗎？","您容易感到害怕或受到驚嚇嗎？","您脅肋部或乳房脹痛嗎？","您無緣無故嘆氣嗎？","您咽喉部有異物感，且吐之不出、咽之不下嗎？"],
xueYu:["您的皮膚在不知不覺中會出現青紫瘀斑（皮下出血）嗎？","您兩顴部有細微紅絲嗎？","您身體上有哪裡疼痛嗎？","您面色晦黯或容易出現褐斑嗎？","您容易有黑眼圈嗎？","您容易忘事（健忘）嗎？","您口唇顏色偏黯嗎？"],
pingHe:["您精力充沛嗎？","您容易疲乏嗎？","您說話聲音低弱無力嗎？","您感到悶悶不樂、情緒低沉嗎？","您比一般人耐受不了寒冷（冬天的寒冷，夏天的冷氣空調、電扇等）嗎？","您能適應外界自然和社會環境的變化嗎？","您容易失眠嗎？"]
};
const reversePingHe=[1,2,3,4,6];

function go(id){document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));document.getElementById(id).classList.remove("hidden");window.scrollTo(0,0)}
function dots(active){let html="";for(let i=1;i<=5;i++)html+=`<div class="dot ${i===active?'active':''}">${i}</div>`;return html}
function selectGender(g,el){gender=g;document.querySelectorAll(".choice").forEach(c=>c.classList.remove("selected"));el.classList.add("selected");document.getElementById("genderNext").disabled=false}
function startStage1(){mode="stage1";current=0;answers=[];renderQ();go("question")}
function cleanQs(key){return stage2[key].map(q=>typeof q==="string"?q:(q[gender]||null)).filter(Boolean)}
function currentKey(){return mode==="stage1"?"qiXu":stage2List[0]}
function renderQ(){
 let qs,key,title,activeStep;
 if(mode==="stage1"){qs=stage1;key=types[current%types.length].key;title=`第1階段 16題初步評估（${current+1}/16）`;activeStep=2}
 else{key=stage2List[0];qs=cleanQs(key);title=`${typeMeta[key].name}問卷（${current+1}/${qs.length}）`;activeStep=(key==="pingHe"?5:3)}
 const meta=typeMeta[key];
 document.getElementById("stepDots").innerHTML=dots(activeStep);
 document.getElementById("stepLabel").innerText=title;
 document.getElementById("progressBar").style.width=((current+1)/qs.length*100)+"%";
 document.getElementById("mascot").innerText=meta.animal;
 document.getElementById("qText").innerText=(current+1)+". "+qs[current];
 document.getElementById("animalTip").innerText=meta.tip;
 let box=document.getElementById("scaleBtns");box.innerHTML="";
 for(let i=1;i<=5;i++){let b=document.createElement("button");b.innerHTML=i+"<small>"+labels[i-1]+"</small>";if(answers[current]===i)b.classList.add("selected");b.onclick=()=>{answers[current]=i;renderQ()};box.appendChild(b)}
 document.getElementById("nextBtn").innerText=current===qs.length-1?"完成":"下一題";
}
function prevQ(){if(current>0){current--;renderQ()}}
function nextQ(){let qs=mode==="stage1"?stage1:cleanQs(stage2List[0]);if(!answers[current]){alert("請先選擇 1～5 分");return} if(current<qs.length-1){current++;renderQ();return} if(mode==="stage1")finishStage1();else finishOneStage2()}
function finishStage1(){
 let scores=types.map(t=>{let s=t.qs.reduce((a,i)=>a+answers[i],0);return {key:t.key,score:s,...typeMeta[t.key]}});
 let max=Math.max(...scores.map(s=>s.score)); stage2List=scores.filter(s=>s.score===max).map(s=>s.key);
 let rows=scores.map(s=>`<tr><td>${s.animal} ${s.name}</td><td><div class="scorebar"><span style="width:${s.score*10}%"></span></div></td><td>${s.score} 分</td></tr>`).join("");
 document.getElementById("scoreTable").innerHTML=`<table>${rows}</table>`;
 document.getElementById("stage1Conclusion").innerHTML=`最高分體質：<b>${stage2List.map(k=>typeMeta[k].animal+" "+typeMeta[k].name).join("、")}</b><br>若最高分同分，系統會全部進入第二階段問卷。`;
 go("stage1Result")
}
function startStage2(){stage2Results=[];answers=[];current=0;mode="stage2";renderQ();go("question")}
function finishOneStage2(){
 let key=stage2List.shift(), qs=cleanQs(key), raw=0;
 answers.forEach((v,i)=>{raw += (key==="pingHe" && reversePingHe.includes(i)) ? (6-v) : v});
 let score=Math.round(((raw-qs.length)/(qs.length*4))*100), judge=score>40?"是":(score>=30?"傾向是":"否");
 stage2Results.push({key,score,judge,raw,n:qs.length,...typeMeta[key]});
 if(stage2List.length>0){answers=[];current=0;renderQ();return}
 let valid=stage2Results.filter(r=>r.score>=30);
 if(valid.length===0 && key!=="pingHe"){stage2List=["pingHe"];answers=[];current=0;renderQ();return}
 showFinal((valid.length?valid:stage2Results).sort((a,b)=>b.score-a.score)[0],stage2Results);
}
function showFinal(best,all){
 document.getElementById("finalMascot").innerText=best.animal;
 document.getElementById("finalTitle").innerText="您的主要體質為："+best.name;
 document.getElementById("finalScore").innerText=best.score+"分";
 document.getElementById("finalJudge").innerText="判定結果："+best.judge;
 let rows=all.map(r=>`<tr><td>${r.animal} ${r.name}</td><td>${r.score}分</td><td>${r.judge}</td></tr>`).join("");
 document.getElementById("finalDetails").innerHTML=`<table><tr><th>體質</th><th>分數</th><th>判定</th></tr>${rows}</table><p class="footer">計算公式：[(總分－題數)/(題數×4)]×100</p>`;
 document.getElementById("finalAdvice").innerHTML=best.advice.map((a,i)=>`<div class="adviceItem"><div class="adviceIcon">${["🥗","🏃","🍵"][i]||"🌿"}</div><div>${a}</div></div>`).join("");
 go("final")
}
