<style>

<body><div class="app">
<section id="home" class="page"><div class="content center"><div class="leaves"><span>🌿</span><span>🍃</span></div><h1>動物森林<br>體質探索站</h1><div class="badge">中醫嘉年華互動體驗</div><div class="heroBox"><div class="animalGrid" id="homeAnimals"></div><p><b>掃描 QR Code 後</b><br>完成簡單問卷，找到你的<br>中醫體質動物夥伴！</p></div><button class="btn" onclick="go('gender')">開始體質檢測 🍀</button><button class="btn secondary" onclick="alert('本問卷僅供健康促進與衛教參考，非醫療診斷。')">使用說明</button></div><div class="footer">三義慈濟中醫醫院<br>健康臺灣深耕計畫</div></section>
<section id="gender" class="page hidden"><div class="content"><div class="stepper"><div class="step active">1</div><div class="step">2</div><div class="step">3</div><div class="step">4</div><div class="step">5</div></div><h2>請選擇您的性別</h2><div class="genderGrid"><div class="genderChoice" onclick="selectGender('male',this)"><div class="face">👦</div><div class="genderText">男性</div><div>›</div></div><div class="genderChoice female" onclick="selectGender('female',this)"><div class="face">👧</div><div class="genderText">女性</div><div>›</div></div></div><div id="genderAnimal" class="animalHero"></div><div class="tip"><b>樹懶提醒：</b>系統會依性別自動調整部分題目喔！</div><div class="nav"><button class="btn secondary" onclick="go('home')">回首頁</button><button id="genderNext" class="btn" disabled onclick="startStage1()">下一步</button></div></div><div class="footer">三義慈濟中醫醫院<br>健康臺灣深耕計畫</div></section>
<section id="question" class="page hidden"><div class="content"><div id="stepper" class="stepper"></div><h2 id="stepLabel"></h2><div class="progress"><div id="progressBar" class="progressBar"></div></div><div id="mascot" class="animalHero"></div><div id="qText" class="question"></div><div id="scale" class="scale"></div><div id="animalTip" class="tip"></div><div class="nav"><button class="btn secondary" onclick="prevQ()">上一題</button><button id="nextBtn" class="btn" onclick="nextQ()">下一題</button></div></div><div class="footer">三義慈濟中醫醫院<br>健康臺灣深耕計畫</div></section>
<section id="stage1Result" class="page hidden"><div class="content"><div class="stepper"><div class="step">1</div><div class="step active">2</div><div class="step">3</div><div class="step">4</div><div class="step">5</div></div><h2>第1階段完成</h2><div id="resultAnimalPreview" class="animalHero"></div><div id="scoreTable"></div><div id="stage1Conclusion" class="tip"></div><button class="btn" onclick="startStage2()">進入對應體質問卷</button></div><div class="footer">三義慈濟中醫醫院<br>健康臺灣深耕計畫</div></section>
<section id="final" class="page hidden"><div class="content"><div class="stepper"><div class="step">1</div><div class="step">2</div><div class="step">3</div><div class="step active">4</div><div class="step">5</div></div><div class="resultCard"><div id="finalMascot" class="animalHero"></div><div class="resultTitle" id="finalTitle"></div><div class="bigScore" id="finalScore"></div><div class="judge" id="finalJudge"></div></div><div id="finalDetails"></div><h2>專屬養生建議</h2><div id="finalAdvice"></div><div class="nav"><button class="btn" onclick="restart()">重新檢測</button><button class="btn secondary" onclick="window.print()">列印/儲存</button></div><p class="disclaimer">本問卷僅供健康促進與衛教參考，非醫療診斷。如有疑問，建議諮詢專業中醫師。</p></div><div class="footer">三義慈濟中醫醫院<br>健康臺灣深耕計畫</div></section>
</div>
<script>
let gender=null,mode="",current=0,answers=[],stage2List=[],stage2Results=[];
const labels=["沒有或根本不","很少或有一點","有時或有些","經常或相當","總是或非常"];
const img=(name,cls="")=>`<img class="${cls}" src="assets/${name}.png" alt="${name}">`;
const meta={
 shiRe:{name:"實熱體質",animal:"magpie",label:"台灣藍鵲",tip:"台灣藍鵲提醒：留意上火、口乾與燥熱感。",advice:["清淡飲食，少辛辣油炸。","補充水分，避免熬夜。","若常口破或咽喉痛，可諮詢中醫師。"]},
 xuRe:{name:"虛熱體質",animal:"unicorn",label:"獨角獸",tip:"獨角獸提醒：身體需要溫柔修復。",advice:["避免熬夜與過度消耗。","選擇溫和放鬆的運動。","注意口乾、眼乾與睡眠品質。"]},
 xuHan:{name:"虛寒體質",animal:"turtle",label:"烏龜",tip:"烏龜提醒：慢慢暖起來，身體會更舒服。",advice:["注意保暖，少喝冰飲。","規律活動促進循環。","避免長時間待在冷氣太強的環境。"]},
 tanShiRe:{name:"痰濕熱體質",animal:"raccoon",label:"浣熊",tip:"浣熊提醒：清爽一點，身體更輕盈。",advice:["飲食清淡，少油炸、甜食與含糖飲料。","增加規律活動。","注意口苦、油膩感與排便狀況。"]},
 qiXu:{name:"氣虛體質",animal:"sloth",label:"樹懶",tip:"樹懶提醒：慢慢來，也要記得休息。",advice:["避免過勞，保持規律作息。","循序漸進增加運動。","疲倦明顯時建議諮詢中醫師。"]},
 xueXu:{name:"血虛體質",animal:"bunny",label:"兔子",tip:"兔子提醒：要好好照顧自己的能量。",advice:["重視睡眠與營養均衡。","避免長期熬夜。","留意頭暈、面色與睡眠狀況。"]},
 qiYu:{name:"氣鬱體質",animal:"cat",label:"貓咪",tip:"貓咪提醒：給自己一點舒服的空間。",advice:["保持心情舒暢。","練習呼吸放鬆與戶外散步。","壓力大時可尋求專業協助。"]},
 xueYu:{name:"血瘀體質",animal:"bluebird",label:"藍色小鳥",tip:"藍色小鳥提醒：動一動，讓循環更順。",advice:["維持活動量，避免久坐。","注意身體疼痛與瘀斑情形。","若疼痛持續，建議諮詢醫師。"]},
 pingHe:{name:"平和體質",animal:"bluebird",label:"藍色小鳥",tip:"藍色小鳥提醒：保持平衡就是最好的養生。",advice:["維持規律作息。","均衡飲食與適度運動。","保持心情愉快。"]}
};
const typeMap=[{key:"shiRe", qs:[0,1]},{key:"xuRe", qs:[2,3]},{key:"xuHan", qs:[4,5]},{key:"tanShiRe", qs:[6,7]},{key:"qiXu", qs:[8,9]},{key:"xueXu", qs:[10,11]},{key:"qiYu", qs:[12,13]},{key:"xueYu", qs:[14,15]}];
const stage1=["您怕熱而耐寒嗎？","您容易上火（常有咽喉痛、舌瘡、口腔潰瘍、口、鼻、唇乾熱感或生瘡癤）嗎？","您感到手腳心發熱嗎？","您皮膚或口唇乾嗎？","您手腳發涼嗎？","您感到怕冷、衣服比別人穿得多嗎？","您面部或鼻部有油膩感或者油亮發光嗎？","您大便黏滯不爽、有解不盡的感覺嗎？","您容易疲乏嗎？","您說話聲音低弱無力嗎？","您的面色蒼白或面色黃而無光澤嗎？","您容易頭暈眼花嗎？（特別是下蹲起立時）","您容易精神緊張、焦慮不安嗎？","您無緣無故嘆氣嗎？","您身體上有哪裡疼痛嗎？","您面色晦黯或容易出現褐斑嗎？"];
const stage2={
shiRe:["您怕熱而耐寒嗎？","您喜歡吃寒涼飲食，或耐受寒涼藥物嗎？","您容易上火（常有咽喉痛、舌瘡、口腔潰瘍、口、鼻、唇乾熱感或生瘡癤）嗎？","您舌體偏紅嗎？","您容易口乾，渴喜冷飲嗎？","您的性慾較強嗎？","您形體強壯結實嗎？","您小便色黃嗎？"],
xuRe:["您感到手腳心發熱嗎？","您感覺身體、臉上發熱嗎？","您皮膚或口唇乾嗎？","您口唇的顏色比一般人紅嗎？","您容易便秘或大便乾燥嗎？","您面部兩顴潮紅或偏紅嗎？","您感到眼睛乾澀嗎？","您感到口乾咽燥，總想喝水嗎？"],
xuHan:["您手腳發涼嗎？","您的胃脘部、背部或腰膝部怕冷嗎？","您感到怕冷、衣服比別人穿得多嗎？","您比一般人耐受不了寒冷（冬天的寒冷，夏天的冷氣空調、電扇等）嗎？","您比別人容易患感冒嗎？","您吃喝涼的東西會感到不舒服或怕吃喝涼東西嗎？","您受涼或吃喝涼的東西後，容易腹瀉（拉肚子）嗎？"],
tanShiRe:["您面部或鼻部有油膩感或者油亮發光嗎？","您容易生痤瘡或瘡癤嗎？","您感到口苦或嘴裡有異味嗎？","您大便黏滯不爽、有解不盡的感覺嗎？","您小便時尿道有發熱感、尿色濃（深）嗎？",{female:"您帶下色黃（白帶顏色發黃）嗎？限女性答",male:"您的陰囊部位潮濕嗎？限男性答"}],
qiXu:["您容易疲乏嗎？","您容易氣短（呼吸短促，接不上氣）嗎？","您容易心慌嗎？","您容易頭暈或站起時眩暈嗎？","您比別人容易感冒嗎？","您喜歡安靜、懶得說話嗎？","您說話聲音低弱無力嗎？","您活動量稍大就容易出虛汗嗎？"],
xueXu:["您的面色蒼白或面色黃而無光澤嗎？","您容易頭暈眼花嗎？（特別是下蹲起立時）",{female:"您的月經顏色淺淡而經量少嗎？限女性答",male:null},"您感覺肢體容易麻木嗎？","您的口唇顏色淡白嗎？","您的指甲顏色淡白嗎？","您的舌體顏色淡白嗎？","您的睡眠品質不好或容易多夢嗎？"],
qiYu:["您感到悶悶不樂、情緒低沉嗎？","您容易精神緊張、焦慮不安嗎？","您多愁善感、感情脆弱嗎？","您容易感到害怕或受到驚嚇嗎？","您脅肋部或乳房脹痛嗎？","您無緣無故嘆氣嗎？","您咽喉部有異物感，且吐之不出、咽之不下嗎？"],
xueYu:["您的皮膚在不知不覺中會出現青紫瘀斑（皮下出血）嗎？","您兩顴部有細微紅絲嗎？","您身體上有哪裡疼痛嗎？","您面色晦黯或容易出現褐斑嗎？","您容易有黑眼圈嗎？","您容易忘事（健忘）嗎？","您口唇顏色偏黯嗎？"],
pingHe:["您精力充沛嗎？","您容易疲乏嗎？","您說話聲音低弱無力嗎？","您感到悶悶不樂、情緒低沉嗎？","您比一般人耐受不了寒冷（冬天的寒冷，夏天的冷氣空調、電扇等）嗎？","您能適應外界自然和社會環境的變化嗎？","您容易失眠嗎？"]};
const reversePingHe=[1,2,3,4,6];
function go(id){document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));document.getElementById(id).classList.remove("hidden");scrollTo(0,0)}
function stepper(active){let s="";for(let i=1;i<=5;i++)s+=`<div class="step ${i===active?'active':''}">${i}</div>`;return s}
function selectGender(g,el){gender=g;document.querySelectorAll(".genderChoice").forEach(c=>c.classList.remove("selected"));el.classList.add("selected");document.getElementById("genderNext").disabled=false}
function cleanQs(key){return stage2[key].map(q=>typeof q==="string"?q:(q[gender]||null)).filter(Boolean)}
function startStage1(){mode="stage1";current=0;answers=[];renderQ();go("question")}
function renderQ(){let qs,key,active,label;if(mode==="stage1"){qs=stage1;key=typeMap[Math.floor(current/2)]?.key||"qiXu";active=2;label=`第1階段 16題初步評估（${current+1}/16）`}else{key=stage2List[0];qs=cleanQs(key);active=key==="pingHe"?5:3;label=`${meta[key].name}問卷（${current+1}/${qs.length}）`}document.getElementById("stepper").innerHTML=stepper(active);document.getElementById("stepLabel").innerText=label;document.getElementById("progressBar").style.width=((current+1)/qs.length*100)+"%";document.getElementById("mascot").innerHTML=img(meta[key].animal);document.getElementById("qText").innerText=(current+1)+". "+qs[current];document.getElementById("animalTip").innerText=meta[key].tip;let box=document.getElementById("scale");box.innerHTML="";for(let i=1;i<=5;i++){let b=document.createElement("button");b.className="scoreBtn"+(answers[current]===i?" selected":"");b.innerHTML=i+`<small>${labels[i-1]}</small>`;b.onclick=()=>{answers[current]=i;renderQ()};box.appendChild(b)}document.getElementById("nextBtn").innerText=current===qs.length-1?"完成":"下一題"}
function prevQ(){if(current>0){current--;renderQ()}}
function nextQ(){let qs=mode==="stage1"?stage1:cleanQs(stage2List[0]);if(!answers[current]){alert("請先選擇 1～5 分");return}if(current<qs.length-1){current++;renderQ();return}mode==="stage1"?finishStage1():finishStage2One()}
function finishStage1(){let scores=typeMap.map(t=>{let score=t.qs.reduce((a,i)=>a+answers[i],0);return {...meta[t.key],key:t.key,score}});let max=Math.max(...scores.map(s=>s.score));stage2List=scores.filter(s=>s.score===max).map(s=>s.key);document.getElementById("scoreTable").innerHTML=`<table class="table">`+scores.map(s=>`<tr><td><img class="smallThumb" src="assets/${s.animal}.png">${s.name}</td><td><div class="track"><div class="fill" style="width:${s.score*10}%"></div></div></td><td>${s.score}分</td></tr>`).join("")+`</table>`;document.getElementById("stage1Conclusion").innerHTML=`最高分體質：<b>${stage2List.map(k=>meta[k].label+"／"+meta[k].name).join("、")}</b><br>若同分，系統會全部進入第二階段。`;document.getElementById("resultAnimalPreview").innerHTML=img(meta[stage2List[0]].animal);go("stage1Result")}
function startStage2(){stage2Results=[];answers=[];current=0;mode="stage2";renderQ();go("question")}
function finishStage2One(){let key=stage2List.shift(),qs=cleanQs(key),raw=0;answers.forEach((v,i)=>raw+=(key==="pingHe"&&reversePingHe.includes(i))?6-v:v);let score=Math.round(((raw-qs.length)/(qs.length*4))*100),judge=score>40?"是":(score>=30?"傾向是":"否");stage2Results.push({...meta[key],key,score,judge,raw,n:qs.length});if(stage2List.length){answers=[];current=0;renderQ();return}let valid=stage2Results.filter(r=>r.score>=30);if(valid.length===0&&key!=="pingHe"){stage2List=["pingHe"];answers=[];current=0;renderQ();return}showFinal((valid.length?valid:stage2Results).sort((a,b)=>b.score-a.score)[0],stage2Results)}
function showFinal(best,all){document.getElementById("finalMascot").innerHTML=img(best.animal);document.getElementById("finalTitle").innerHTML=`你的體質夥伴是<br>${best.label}｜${best.name}`;document.getElementById("finalScore").innerText=`${best.score}分`;document.getElementById("finalJudge").innerText=`判定結果：${best.judge}`;document.getElementById("finalDetails").innerHTML=`<table class="table"><tr><th>體質</th><th>分數</th><th>判定</th></tr>`+all.map(r=>`<tr><td><img class="smallThumb" src="assets/${r.animal}.png">${r.name}</td><td>${r.score}分</td><td>${r.judge}</td></tr>`).join("")+`</table><div class="disclaimer">計算公式：[(總分－題數)/(題數×4)]×100</div>`;document.getElementById("finalAdvice").innerHTML=best.advice.map((a,i)=>`<div class="advice"><div class="iconBox">${["🥗","🏃","🍵"][i]}</div><div>${a}</div></div>`).join("");go("final")}
function restart(){gender=null;stage2List=[];stage2Results=[];answers=[];current=0;document.querySelectorAll(".genderChoice").forEach(c=>c.classList.remove("selected"));document.getElementById("genderNext").disabled=true;go("home")}
document.getElementById("homeAnimals").innerHTML=["bluebird","unicorn","bunny","cat","sloth","raccoon","turtle","magpie"].map(a=>`<div class="animalMini">${img(a)}</div>`).join("");document.getElementById("genderAnimal").innerHTML=img("sloth");
</script></body></html>
