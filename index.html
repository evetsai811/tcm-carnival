<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>中醫嘉年華｜動物森林體質探索站 v3</title>
<style>
:root{
  --forest:#2f7d45;
  --forest2:#4d9a5e;
  --leaf:#9fca74;
  --cream:#fff8e8;
  --paper:#fffdf7;
  --line:#eadcc4;
  --brown:#8c5f35;
  --orange:#f0a03a;
  --pink:#f58f9b;
  --blue:#5c9ccc;
  --shadow:0 12px 32px rgba(74, 95, 55, .18);
}
*{box-sizing:border-box}
body{
  margin:0;
  color:#2f392f;
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
  background:
    radial-gradient(circle at 12% 5%, rgba(244,211,133,.42) 0 8%, transparent 9%),
    radial-gradient(circle at 88% 18%, rgba(163,203,121,.35) 0 10%, transparent 11%),
    linear-gradient(180deg,#fff7df 0%,#f4fbef 55%,#fff8e8 100%);
}
.app{
  max-width:520px;
  min-height:100vh;
  margin:0 auto;
  padding:14px 14px 24px;
}
.phone{
  background:rgba(255,253,247,.95);
  border:1px solid var(--line);
  border-radius:34px;
  box-shadow:var(--shadow);
  padding:20px;
  margin:12px 0;
  position:relative;
  overflow:hidden;
}
.phone::before,.phone::after{
  content:"";
  position:absolute;
  width:140px;height:140px;
  background:
    radial-gradient(ellipse at center, rgba(126,171,91,.28) 0 32%, transparent 33%),
    radial-gradient(ellipse at 62% 42%, rgba(126,171,91,.18) 0 20%, transparent 21%);
  border-radius:50%;
  pointer-events:none;
}
.phone::before{top:-70px;right:-48px}
.phone::after{bottom:-70px;left:-55px}
.screen{position:relative;z-index:1}
.top-leaves{
  height:38px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:var(--leaf);
  font-size:1.7rem;
}
h1,h2,h3{margin:.35em 0;color:var(--forest);letter-spacing:.03em}
h1{font-size:2.35rem;line-height:1.15;text-align:center;text-shadow:0 2px #fff}
h2{font-size:1.55rem;text-align:center}
p{line-height:1.65}
.badge{
  display:inline-block;
  background:linear-gradient(180deg,#9a7043,#7b522e);
  color:white;
  border-radius:999px;
  padding:7px 16px;
  font-weight:900;
  letter-spacing:.04em;
}
.center{text-align:center}
.bigForest{
  background:linear-gradient(180deg,#f2f9df,#e7f5d4);
  border:1px solid #dbe8c7;
  border-radius:26px;
  padding:12px 8px;
  margin:14px 0;
}
.animalBand{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:7px;
  margin:12px 0 4px;
}
.animalToken{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#fff8df;border:2px solid #e7d5ac;
  font-size:2rem;
  box-shadow:0 6px 10px rgba(110,130,90,.13);
}
.bigMascot{
  width:150px;height:150px;margin:18px auto 10px;
  border-radius:38px;
  display:flex;align-items:center;justify-content:center;
  font-size:5.6rem;
  background:linear-gradient(180deg,#fff4d5,#e7f7d7);
  border:2px solid #e7d4a6;
  box-shadow:0 8px 18px rgba(100,120,80,.15);
}
.btn{
  width:100%;
  border:0;
  border-radius:999px;
  padding:15px 18px;
  margin:8px 0;
  font-size:1.08rem;
  font-weight:900;
  color:white;
  background:linear-gradient(180deg,#61ad68,#2f884b);
  box-shadow:0 8px 16px rgba(45,120,65,.22);
  cursor:pointer;
}
.btn.secondary{
  background:#fff8e8;
  color:#6a4c30;
  border:1px solid #decaa8;
  box-shadow:none;
}
.btn:disabled{opacity:.45;cursor:not-allowed}
.stepper{
  display:flex;align-items:center;justify-content:center;gap:8px;margin:6px 0 16px;
}
.step{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#fff8e8;border:1px solid #dfcda9;
  color:#88704b;font-weight:900;
}
.step.active{background:var(--forest);color:white;border-color:var(--forest)}
.genderGrid{display:grid;gap:14px}
.genderChoice{
  display:grid;grid-template-columns:84px 1fr 24px;
  align-items:center;
  background:linear-gradient(180deg,#eff9f0,#fbfff8);
  border:2px solid #d6e5ce;
  border-radius:22px;
  padding:14px;
  cursor:pointer;
}
.genderChoice.female{background:linear-gradient(180deg,#fff0f2,#fffafa);border-color:#f0cad0}
.genderChoice.selected{box-shadow:0 0 0 4px rgba(76,154,94,.16);border-color:var(--forest)}
.face{
  width:68px;height:68px;border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.7rem;background:white;border:1px solid #eedec4;
}
.genderText{font-size:1.5rem;font-weight:900;color:var(--forest)}
.female .genderText{color:#b84d61}
.tip{
  background:#fff8e8;
  border:1px solid #ead8b8;
  border-radius:18px;
  padding:12px 14px;
  margin:12px 0;
  line-height:1.7;
}
.progress{
  height:10px;background:#e7dece;border-radius:999px;overflow:hidden;margin:12px 0 18px;
}
.progressBar{height:100%;width:0%;background:linear-gradient(90deg,#9cc96b,#2f884b)}
.question{
  background:#fff;
  border:1px solid var(--line);
  border-radius:22px;
  padding:16px;
  text-align:center;
  font-size:1.22rem;
  font-weight:900;
  line-height:1.65;
}
.scale{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:7px;
  margin:14px 0 4px;
}
.scoreBtn{
  background:white;
  border:2px solid #decfb6;
  border-radius:16px;
  padding:11px 2px;
  font-weight:900;
  cursor:pointer;
}
.scoreBtn.selected{
  background:var(--forest2);
  color:white;
  border-color:var(--forest2);
}
.scoreBtn small{
  display:block;
  font-size:.62rem;
  font-weight:500;
  margin-top:5px;
  line-height:1.25;
}
.nav{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:16px;
}
.table{
  width:100%;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:18px;
  background:white;
  font-size:.93rem;
}
.table th,.table td{
  padding:9px 7px;
  border-bottom:1px solid #efe4d0;
}
.scoreTrack{
  height:10px;background:#eee3d0;border-radius:999px;overflow:hidden;min-width:92px;
}
.scoreFill{height:100%;background:linear-gradient(90deg,#f1a05b,#63ad66)}
.resultTitle{
  text-align:center;
  font-size:2rem;
  font-weight:1000;
  color:var(--forest);
  background:#fff4cf;
  border-radius:18px;
  padding:8px;
  margin:10px 0;
}
.bigScore{
  text-align:center;
  font-size:4.2rem;
  font-weight:1000;
  color:var(--forest);
  line-height:1;
}
.judge{
  text-align:center;
  display:block;
  margin:10px auto;
  background:var(--forest);
  color:white;
  border-radius:999px;
  padding:10px 18px;
  font-size:1.35rem;
  font-weight:900;
  width:max-content;
  max-width:100%;
}
.advice{
  display:grid;
  grid-template-columns:54px 1fr;
  gap:10px;
  align-items:center;
  background:#fffaf0;
  border:1px solid #eadcc4;
  border-radius:18px;
  padding:12px;
  margin:10px 0;
}
.adviceIcon{
  width:48px;height:48px;border-radius:16px;background:#edf8df;
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;
}
.footer{
  text-align:center;
  font-size:.78rem;
  color:#7b776d;
  margin-top:12px;
}
.hidden{display:none}
@media(max-width:420px){
  .app{padding:8px}
  .phone{border-radius:28px;padding:16px}
  h1{font-size:2rem}
  .bigMascot{width:130px;height:130px;font-size:4.9rem}
  .animalToken{width:46px;height:46px;font-size:1.75rem}
  .question{font-size:1.08rem}
}
</style>
</head>
<body>
<div class="app">

<section id="home" class="phone">
  <div class="screen center">

    <div class="footer">三義慈濟醫院｜健康台灣深耕計畫</div>

</section>

<section id="gender" class="phone hidden">
  <div class="screen">
    <div class="stepper"><div class="step active">1</div><div class="step">2</div><div class="step">3</div><div class="step">4</div><div class="step">5</div></div>
    <h2>請選擇您的性別</h2>
    <div class="genderGrid">
      <div class="genderChoice" onclick="selectGender('male',this)">

    <div class="nav">
      <button class="btn secondary" onclick="go('home')">回首頁</button>
      <button id="genderNext" class="btn" disabled onclick="startStage1()">下一步</button>
    </div>
  </div>
</section>

<section id="question" class="phone hidden">
  <div class="screen">
    <div id="stepper" class="stepper"></div>
    <h2 id="stepLabel"></h2>
    <div class="progress"><div id="progressBar" class="progressBar"></div></div>
    <div id="mascot" class="bigMascot"></div>
    <div id="qText" class="question"></div>
    <div id="scale" class="scale"></div>
    <div id="animalTip" class="tip"></div>
    <div class="nav">
      <button class="btn secondary" onclick="prevQ()">上一題</button>
      <button id="nextBtn" class="btn" onclick="nextQ()">下一題</button>
    </div>
  </div>
</section>

<section id="stage1Result" class="phone hidden">
  <div class="screen">
    <div class="stepper"><div class="step">1</div><div class="step active">2</div><div class="step">3</div><div class="step">4</div><div class="step">5</div></div>
    <h2>第1階段結果</h2>
    <div class="bigMascot">🦝</div>
    <div id="scoreTable"></div>
    <div id="stage1Conclusion" class="tip"></div>
    <button class="btn" onclick="startStage2()">進入對應體質問卷</button>
  </div>
</section>

<section id="final" class="phone hidden">
  <div class="screen">
    <div class="stepper"><div class="step">1</div><div class="step">2</div><div class="step">3</div><div class="step active">4</div><div class="step">5</div></div>
    <div id="finalMascot" class="bigMascot"></div>
    <div id="finalTitle" class="resultTitle"></div>
    <div id="finalScore" class="bigScore"></div>
    <div id="finalJudge" class="judge"></div>
    <div id="finalDetails"></div>
    <h2>專屬養生建議</h2>
    <div id="finalAdvice"></div>
    <div class="nav">
      <button class="btn" onclick="restart()">重新檢測</button>
      <button class="btn secondary" onclick="window.print()">列印/儲存</button>
    </div>
  </div>
</section>

<div class="footer">本問卷僅供健康促進與衛教參考，非醫療診斷。如有疑問請諮詢專業中醫師。</div>
</div>

qiYu:["您感到悶悶不樂、情緒低沉嗎？","您容易精神緊張、焦慮不安嗎？","您多愁善感、感情脆弱嗎？","您容易感到害怕或受到驚嚇嗎？","您脅肋部或乳房脹痛嗎？","您無緣無故嘆氣嗎？","您咽喉部有異物感，且吐之不出、咽之不下嗎？"],
xueYu:["您的皮膚在不知不覺中會出現青紫瘀斑（皮下出血）嗎？","您兩顴部有細微紅絲嗎？","您身體上有哪裡疼痛嗎？","您面色晦黯或容易出現褐斑嗎？","您容易有黑眼圈嗎？","您容易忘事（健忘）嗎？","您口唇顏色偏黯嗎？"],
pingHe:["您精力充沛嗎？","您容易疲乏嗎？","您說話聲音低弱無力嗎？","您感到悶悶不樂、情緒低沉嗎？","您比一般人耐受不了寒冷（冬天的寒冷，夏天的冷氣空調、電扇等）嗎？","您能適應外界自然和社會環境的變化嗎？","您容易失眠嗎？"]
};
const reversePingHe=[1,2,3,4,6];

function go(id){document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));document.getElementById(id).classList.remove("hidden");scrollTo(0,0)}
function stepper(active){let s="";for(let i=1;i<=5;i++)s+=`<div class="step ${i===active?'active':''}">${i}</div>`;return s}
function selectGender(g,el){gender=g;document.querySelectorAll(".genderChoice").forEach(c=>c.classList.remove("selected"));el.classList.add("selected");document.getElementById("genderNext").disabled=false}
function cleanQs(key){return stage2[key].map(q=>typeof q==="string"?q:(q[gender]||null)).filter(Boolean)}
function startStage1(){mode="stage1";current=0;answers=[];renderQ();go("question")}
function renderQ(){
 let qs,key,active,label;
 if(mode==="stage1"){qs=stage1;key=typeMap[Math.floor(current/2)]?.key||"qiXu";active=2;label=`第1階段 16題初步評估（${current+1}/16）`}
 else{key=stage2List[0];qs=cleanQs(key);active=key==="pingHe"?5:3;label=`${meta[key].name}問卷（${current+1}/${qs.length}）`}
 document.getElementById("stepper").innerHTML=stepper(active);
 document.getElementById("stepLabel").innerText=label;
 document.getElementById("progressBar").style.width=((current+1)/qs.length*100)+"%";
 document.getElementById("mascot").innerText=meta[key].animal;
 document.getElementById("qText").innerText=(current+1)+". "+qs[current];
 document.getElementById("animalTip").innerText=meta[key].tip;
 let box=document.getElementById("scale");box.innerHTML="";
 for(let i=1;i<=5;i++){
   let b=document.createElement("button");
   b.className="scoreBtn"+(answers[current]===i?" selected":"");
   b.innerHTML=i+`<small>${labels[i-1]}</small>`;
   b.onclick=()=>{answers[current]=i;renderQ()};
   box.appendChild(b);
 }
 document.getElementById("nextBtn").innerText=current===qs.length-1?"完成":"下一題";
}
function prevQ(){if(current>0){current--;renderQ()}}
function nextQ(){
 let qs=mode==="stage1"?stage1:cleanQs(stage2List[0]);
 if(!answers[current]){alert("請先選擇 1～5 分");return}
 if(current<qs.length-1){current++;renderQ();return}
 mode==="stage1"?finishStage1():finishStage2One();
}
function finishStage1(){
 let scores=typeMap.map(t=>{let score=t.qs.reduce((a,i)=>a+answers[i],0);return {...meta[t.key],key:t.key,score}});
 let max=Math.max(...scores.map(s=>s.score));stage2List=scores.filter(s=>s.score===max).map(s=>s.key);
 document.getElementById("scoreTable").innerHTML=`<table class="table">`+scores.map(s=>`<tr><td>${s.animal} ${s.name}</td><td><div class="scoreTrack"><div class="scoreFill" style="width:${s.score*10}%"></div></div></td><td>${s.score}分</td></tr>`).join("")+`</table>`;
 document.getElementById("stage1Conclusion").innerHTML=`最高分體質：<b>${stage2List.map(k=>meta[k].animal+" "+meta[k].name).join("、")}</b><br>若同分，系統會全部進入第二階段。`;
 go("stage1Result");
}
function startStage2(){stage2Results=[];answers=[];current=0;mode="stage2";renderQ();go("question")}
function finishStage2One(){
 let key=stage2List.shift(),qs=cleanQs(key),raw=0;
 answers.forEach((v,i)=>raw += (key==="pingHe" && reversePingHe.includes(i)) ? 6-v : v);
 let score=Math.round(((raw-qs.length)/(qs.length*4))*100),judge=score>40?"是":(score>=30?"傾向是":"否");
 stage2Results.push({...meta[key],key,score,judge,raw,n:qs.length});
 if(stage2List.length){answers=[];current=0;renderQ();return}
 let valid=stage2Results.filter(r=>r.score>=30);
 if(valid.length===0 && key!=="pingHe"){stage2List=["pingHe"];answers=[];current=0;renderQ();return}
 showFinal((valid.length?valid:stage2Results).sort((a,b)=>b.score-a.score)[0],stage2Results);
}
function showFinal(best,all){
 document.getElementById("finalMascot").innerText=best.animal;
 document.getElementById("finalTitle").innerText=`您的主要體質為 ${best.name}`;
 document.getElementById("finalScore").innerText=`${best.score}分`;
 document.getElementById("finalJudge").innerText=`判定結果：${best.judge}`;
 document.getElementById("finalDetails").innerHTML=`<table class="table"><tr><th>體質</th><th>分數</th><th>判定</th></tr>`+all.map(r=>`<tr><td>${r.animal} ${r.name}</td><td>${r.score}分</td><td>${r.judge}</td></tr>`).join("")+`</table><div class="footer">計算公式：[(總分－題數)/(題數×4)]×100</div>`;
 document.getElementById("finalAdvice").innerHTML=best.advice.map((a,i)=>`<div class="advice"><div class="adviceIcon">${["🥗","🏃","🍵"][i]}</div><div>${a}</div></div>`).join("");
 go("final");
}
function restart(){gender=null;stage2List=[];stage2Results=[];answers=[];current=0;document.querySelectorAll(".genderChoice").forEach(c=>c.classList.remove("selected"));document.getElementById("genderNext").disabled=true;go("home")}
</script>
</body>
</html>
